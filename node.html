<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노드 — AI 기술 계보</title>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--text:#e2e8f0;--muted:#64748b;--c:#6366f1}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
nav{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.nav-back{color:var(--muted);text-decoration:none;font-size:0.85rem;display:flex;align-items:center;gap:5px;transition:color .2s}
.nav-back:hover{color:var(--text)}
.nav-num{font-family:monospace;font-size:0.8rem;padding:3px 8px;border-radius:5px;background:var(--c)20;color:var(--c)}
.nav-name{font-weight:700;font-size:0.95rem}
.nav-r{margin-left:auto;display:flex;gap:8px}
.nav-btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.8rem;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-block}
.nav-btn:hover{border-color:var(--c);color:var(--c)}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 53px)}
@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
.info-panel{padding:32px 28px;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 53px)}
@media(max-width:900px){.info-panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
.node-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:999px;font-size:0.75rem;font-weight:700;margin-bottom:16px}
.node-title{font-size:1.8rem;font-weight:800;margin-bottom:8px;line-height:1.2}
.node-era{font-size:0.8rem;color:var(--muted);margin-bottom:24px}
.info-row{margin-bottom:16px}
.info-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px}
.info-val{font-size:0.9rem;line-height:1.6;color:var(--text)}
.info-val.mono{font-family:monospace;background:var(--surface);padding:10px;border-radius:8px;border:1px solid var(--border);font-size:0.82rem}
.kw-list{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.kw{padding:3px 8px;border-radius:5px;font-size:0.72rem;background:var(--c)15;color:var(--c);border:1px solid var(--c)25}
.ai-connection{margin-top:20px;padding:14px;border-radius:10px;background:linear-gradient(135deg,var(--c)08,transparent);border:1px solid var(--c)20}
.ai-connection-label{font-size:0.7rem;color:var(--c);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.ai-connection-text{font-size:0.85rem;line-height:1.6}
.node-nav{display:flex;gap:8px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.nn-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:0.8rem;cursor:pointer;text-align:center;transition:all .2s;text-decoration:none;display:block}
.nn-btn:hover{border-color:var(--c);color:var(--c)}
.nn-btn span{display:block;font-size:0.65rem;color:var(--muted);margin-bottom:2px}
.nn-btn:disabled{opacity:0.3;cursor:not-allowed}
.sim-panel{display:flex;flex-direction:column;overflow:hidden;max-height:calc(100vh - 53px)}
@media(max-width:900px){.sim-panel{max-height:80vh;min-height:500px}}
.sim-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sim-title{font-size:0.85rem;font-weight:600}
.sim-tag{font-size:0.72rem;padding:3px 10px;border-radius:999px;background:var(--c)15;color:var(--c);border:1px solid var(--c)30}
.sim-body{flex:1;overflow:auto;padding:20px;position:relative}
.sim-container{width:100%;height:100%;min-height:400px}
.sim-info{font-size:0.8rem;color:var(--muted);margin-top:8px;line-height:1.5}
.sim-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--c)40;background:var(--c)15;color:var(--c);font-size:0.82rem;cursor:pointer;transition:all .2s;font-family:inherit}
.sim-btn:hover{background:var(--c)30}
.sim-btn.primary{background:var(--c);color:white;border-color:var(--c)}
.sim-btn.primary:hover{filter:brightness(1.15)}
.sim-controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
</style>
</head>
<body>
<nav>
  <a class="nav-back" href="category.html" id="navCategoryLink">← 카테고리</a>
  <span style="color:var(--border)">|</span>
  <span class="nav-num" id="navNum">#001</span>
  <span class="nav-name" id="navName">노드</span>
  <div class="nav-r">
    <a class="nav-btn" id="navCatLink" href="#">카테고리</a>
  </div>
</nav>

<div class="layout">
  <div class="info-panel" id="infoPanel"></div>
  <div class="sim-panel">
    <div class="sim-header">
      <span class="sim-title">🔬 인터랙티브 체험</span>
      <span class="sim-tag" id="simTag">시뮬레이션</span>
    </div>
    <div class="sim-body">
      <div class="sim-container" id="simContainer"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="simulations/loader.js"></script>
<script>
const CAT_COLORS = {'A':'#6366f1','B':'#8b5cf6','C':'#a855f7','D':'#ec4899','E':'#f97316','F':'#eab308','G':'#22c55e','H':'#06b6d4','I':'#3b82f6','J':'#a855f7','K':'#14b8a6','L':'#f59e0b','M':'#ef4444'};

function loadNode() {
  const nodeId = parseInt(location.hash.replace('#','') || '1');
  const node = NODES.find(n => n['번호'] === nodeId) || NODES[0];
  const catLetter = node['대분류'][0];
  const color = CAT_COLORS[catLetter] || '#6366f1';
  const actualNodeId = node['번호'];
  
  document.documentElement.style.setProperty('--c', color);
  document.getElementById('navNum').textContent = '#' + String(actualNodeId).padStart(3,'0');
  document.getElementById('navName').textContent = node['기술 노드'];
  document.getElementById('navCategoryLink').href = `category.html#${catLetter}`;
  document.getElementById('navCatLink').href = `category.html#${catLetter}`;

  const prevNode = NODES.find(n => n['번호'] === actualNodeId - 1);
  const nextNode = NODES.find(n => n['번호'] === actualNodeId + 1);
  
  const steps = (node['처리 절차'] || '').split(/→|▶/).map(s => s.trim()).filter(Boolean);
  const kws = (node['키워드'] || '').split(';').map(s => s.trim()).filter(Boolean);

  let navHTML = '<div class="node-nav">';
  if (prevNode) {
    navHTML += `<a class="nn-btn" href="node.html#${prevNode['번호']}"><span>← 이전</span>${prevNode['기술 노드']}</a>`;
  } else {
    navHTML += '<button class="nn-btn" disabled style="opacity:0.3"><span>← 이전</span>없음</button>';
  }
  if (nextNode) {
    navHTML += `<a class="nn-btn" href="node.html#${nextNode['번호']}"><span>다음 →</span>${nextNode['기술 노드']}</a>`;
  } else {
    navHTML += '<button class="nn-btn" disabled style="opacity:0.3"><span>다음 →</span>없음</button>';
  }
  navHTML += '</div>';

  document.getElementById('infoPanel').innerHTML = `
    <div class="node-badge" style="background:${color}15;color:${color};border:1px solid ${color}30">
      ${node['대분류']}
    </div>
    <div class="node-title">${node['기술 노드']}</div>
    <div class="node-era">⏱ ${node['대략적 시기']} · 노드 #${actualNodeId}</div>

    <div class="info-row">
      <div class="info-label">하드웨어 / 매체</div>
      <div class="info-val">${node['하드웨어/매체'] || '—'}</div>
    </div>
    <div class="info-row">
      <div class="info-label">표상 · 데이터</div>
      <div class="info-val">${node['표상·데이터'] || '—'}</div>
    </div>
    <div class="info-row">
      <div class="info-label">대표 알고리즘 · 처리 방식</div>
      <div class="info-val">${node['대표 알고리즘·처리 방식'] || '—'}</div>
    </div>
    <div class="info-row">
      <div class="info-label">처리 절차</div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-top:4px">
        ${steps.length > 0 ? steps.map((s, i) => `<div style="font-size:0.85rem;color:var(--text)"><span style="color:var(--c);font-weight:700">${i + 1}.</span> ${s}</div>`).join('') : '<div class="info-val">—</div>'}
      </div>
    </div>
    <div class="info-row">
      <div class="info-label">모델 · 학습 원리</div>
      <div class="info-val">${node['모델·학습/원리'] || '—'}</div>
    </div>
    <div class="info-row">
      <div class="info-label">과제 처리 예시</div>
      <div class="info-val mono">${node['과제 처리'] || '—'}</div>
    </div>
    <div class="info-row">
      <div class="info-label">키워드</div>
      <div class="kw-list">${kws.length > 0 ? kws.map(k => `<span class="kw">${k}</span>`).join('') : '<span class="info-val">—</span>'}</div>
    </div>
    <div class="ai-connection">
      <div class="ai-connection-label">→ AI 관련성 / 다음 연결</div>
      <div class="ai-connection-text">${node['AI 관련성/다음 연결'] || '—'}</div>
    </div>
    ${navHTML}
  `;

  // 시뮬레이션 로드
  const runSim = () => {
    if (window.SIM_MAP && window.SIM_MAP[actualNodeId]) {
      window.SIM_MAP[actualNodeId]();
    } else {
      defaultFlowSim();
    }
  };

  setTimeout(runSim, 100);
  setTimeout(runSim, 500);
}

function defaultFlowSim() {
  document.getElementById('simTag').textContent = '처리 흐름 시각화';
  const node = NODES.find(n => n['번호'] === parseInt(location.hash.replace('#','') || '1')) || NODES[0];
  const boxes = [
    node['표상·데이터'] || '입력 데이터',
    node['대표 알고리즘·처리 방식'] || '처리',
    node['모델·학습/원리'] || '모델/원리',
    node['적용·영향'] || '결과/적용'
  ];
  document.getElementById('simContainer').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;height:100%">' + boxes.map((b,i) => '<div style="padding:12px 20px;border-radius:10px;border:1px solid var(--c)30;background:var(--c)10;color:var(--text);max-width:300px;text-align:center;transition:all .3s" onmouseover="this.style.backgroundColor=\'var(--c)20)\';this.style.transform=\'scale(1.03)\'" onmouseout="this.style.backgroundColor=\'var(--c)10)\';this.style.transform=\'scale(1)\'">' + b + '</div>' + (i < boxes.length - 1 ? '<div style="color:var(--c);font-size:18px">↓</div>' : '')).join('') + '</div>';
}

window.addEventListener('hashchange', loadNode);
loadNode();
</script>
</body>
</html>
